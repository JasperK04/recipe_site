{% extends "base.html" %}

{% block title %}Profiel - Recepten{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <h2 class="card-title mb-0">Mijn Profiel</h2>
                    <a href="{{ url_for('auth.edit_profile') }}" class="btn btn-primary">Profiel bewerken</a>
                </div>

                <div class="mb-4">
                    <h5>Accountinformatie</h5>
                    <p class="mb-1"><strong>Gebruikersnaam:</strong> {{ current_user.username }}</p>
                    <p class="mb-0"><strong>E-mail:</strong> {{ current_user.email }}</p>
                </div>

                <hr>

            </div>
        </div>
    </div>
</div>
{% endblock %}
